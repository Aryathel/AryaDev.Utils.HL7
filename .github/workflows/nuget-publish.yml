name: Build, Test, and Publish NuGet

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve package version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" ]]; then
            echo "Tag '${TAG}' did not yield a package version." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing AryaDev.Utils.HL7 ${VERSION}"

      - name: Restore
        run: dotnet restore AryaDev.Utils.HL7.sln

      - name: Build
        run: >
          dotnet build AryaDev.Utils.HL7.sln
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: >
          dotnet test AryaDev.Utils.HL7.sln
          --configuration Release
          --no-build
          --verbosity normal

      - name: Pack Serializer
        run: >
          dotnet pack AryaDev.Utils.HL7.Serializer/AryaDev.Utils.HL7.Serializer.csproj
          --configuration Release
          --no-build
          --output "${{ github.workspace }}/artifacts"
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:GeneratePackageOnBuild=false

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key "${NUGET_API_KEY}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
